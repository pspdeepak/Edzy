<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register for Live Class</title>
    <style>
        :root { --primary: #25D366; --dark: #128C7E; --bg: #f4f7f6; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg); 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; 
        }
        .card { 
            background: white; padding: 2rem; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            width: 90%; max-width: 400px; text-align: center; 
        }
        h1 { color: #333; margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-group { text-align: left; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #444; }
        input { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; font-size: 1rem; 
        }
        button { 
            width: 100%; padding: 12px; background-color: var(--primary); 
            color: white; border: none; border-radius: 8px; 
            font-size: 1rem; font-weight: bold; cursor: pointer; 
            transition: background 0.3s; margin-top: 10px; 
        }
        button:hover { background-color: var(--dark); }
        .footer-note { font-size: 0.8rem; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <!-- page headding and logo -->

<!-- delete if section related to logo if it doesnt work -->
<div class="card">
    <!-- START MINIMALIST HEADER -->
    <div style="text-align: center; margin-bottom: 30px;">
        <h1 style="font-family: Arial, sans-serif; font-weight: 800; font-size: 3rem; color: #1a1a1a; margin: 0; letter-spacing: -2px;">
            EDZY<span style="color: #25D366;">.</span>
        </h1>
        <p style="font-family: Arial, sans-serif; font-weight: 300; font-size: 0.8rem; color: #888; margin: 0; letter-spacing: 3px; text-transform: lowercase; margin-top: -5px;">
            education made easy
        </p>
    </div>
    <!-- END MINIMALIST HEADER -->
    
    <p style="color: #444; margin-bottom: 20px;">🚀 Register below for the Live Class link</p>
    
    <form id="registrationForm">
    
<!-- delete if section related to logo if it doesnt work and replace with below lines
        
        <h1>🚀 Join the Live Class</h1>

    <p>Register below to receive the YouTube Live link and reminders via WhatsApp.</p>

        -->
    
    <form id="registrationForm">
        <div class="form-group">
            <label for="username">Full Name</label>
            <input type="text" id="username" placeholder="Enter your name" required>
        </div>
        <div class="form-group">
            <label for="phone">WhatsApp Number</label>
            <input type="tel" id="phone" placeholder="e.g. +91 9876543210" required>
        </div>
        <button type="submit">Get Access via WhatsApp</button>
    </form>

    <p class="footer-note">Registration is free. link will be sent to WhatsApp.</p>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('username').value;
        
        // IMPORTANT: Replace with your actual WhatsApp number (including country code, no '+')
        const myNumber = "917204878542"; 
        
        // Create the pre-filled message
        const message = `Hi! My name is ${name}. I just registered for your class. Please send me the link!`;
        
        // Redirect to WhatsApp
        const whatsappUrl = `https://wa.me/${myNumber}?text=${encodeURIComponent(message)}`;
        window.location.href = whatsappUrl;
    });
</script>

</body>
</html>
